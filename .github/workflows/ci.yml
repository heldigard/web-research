name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: "0.11.29"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked test toolchain
        run: uv sync --extra test --locked
      - name: Format check
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy src/
      - name: Run tests + coverage gate
        run: |
          uv run pytest --cov=web_research --cov-fail-under=85 --cov-report=term-missing
      - name: Build distributions
        run: uv run python -m build
      - name: Smoke installed wheel
        run: |
          uv venv --python 3.12 "$RUNNER_TEMP/web-research-smoke"
          uv pip install --python "$RUNNER_TEMP/web-research-smoke/bin/python" dist/*.whl
          "$RUNNER_TEMP/web-research-smoke/bin/web-research" --version

  compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: "0.11.29"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install locked test toolchain
        run: uv sync --extra test --locked
      - name: Run tests
        run: uv run pytest
